services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD:-Your_strong_password123}"
    ports:
      - "1433:1433"
    volumes:
      - mssql_data:/var/opt/mssql

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  # One-shot (profile setup): pull default LLM — must match AI_module/config.py → llm_model (default phi3:mini).
  ollama_pull:
    profiles: ["setup"]
    image: ollama/ollama:latest
    depends_on:
      - ollama
    environment:
      OLLAMA_HOST: "http://ollama:11434"
    volumes:
      - ollama_data:/root/.ollama
    entrypoint: ["/bin/sh", "-c", "ollama pull ${OLLAMA_LLM_MODEL:-phi3:mini}"]

  # One-shot (profile setup): embedding snapshot + reranker warmup.
  model_prep:
    profiles: ["setup"]
    build:
      context: ..
      dockerfile: AI_api/Dockerfile
    environment:
      HF_HOME: /models/huggingface
    volumes:
      - hf_cache:/models/huggingface
      - rag_models:/app/AI_module/data/models
    command: >
      python -c "from AI_module.dev_tools.download_embedding_model import main as d;
      import sys; rc=d();
      from sentence_transformers import CrossEncoder;
      CrossEncoder('cross-encoder/ms-marco-MiniLM-L-6-v2');
      sys.exit(rc)"

  rag:
    build:
      context: ..
      dockerfile: AI_api/Dockerfile
    depends_on:
      - qdrant
    environment:
      QDRANT_HOST: qdrant
      QDRANT_PORT: "6333"
      OLLAMA_HOST: "${OLLAMA_HOST:-http://ollama:11434}"
      HF_HOME: /models/huggingface
    ports:
      - "8000:8000"
    volumes:
      - hf_cache:/models/huggingface
      - rag_models:/app/AI_module/data/models
      - ../AI_module/data/pdfs:/app/AI_module/data/pdfs:ro

  smartpdfreaderapi:
    build:
      context: ..
      dockerfile: SmartPdfReaderApi/SmartPdfReaderApi/Dockerfile
    depends_on:
      - mssql
      - rag
    environment:
      ASPNETCORE_URLS: http://0.0.0.0:5000
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Server=tcp:mssql,1433;Database=ChatHistoryDb;User Id=sa;Password=${MSSQL_SA_PASSWORD:-Your_strong_password123};Encrypt=False;TrustServerCertificate=True;MultipleActiveResultSets=true;"
      ChatService__FastApiBaseUrl: "http://rag:8000"
    ports:
      - "5000:5000"

volumes:
  qdrant_data:
  mssql_data:
  ollama_data:
  hf_cache:
  rag_models:
