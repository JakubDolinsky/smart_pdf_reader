services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD:-Your_strong_password123}"
    ports:
      - "1433:1433"
    volumes:
      - mssql_data:/var/opt/mssql

  # Fully dockerized setup uses Ollama in Docker (profile-based).
  ollama:
    profiles: ["ollama"]
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  # One-shot: pull default LLM for RAG (must match AI_module/config.py → llm_model, default phi3:mini).
  # Override on host: OLLAMA_LLM_MODEL=mistral:latest docker compose --profile ollama run --rm ollama_pull
  # Run: docker compose --profile ollama run --rm ollama_pull
  ollama_pull:
    profiles: ["ollama"]
    image: ollama/ollama:latest
    depends_on:
      - ollama
    volumes:
      - ollama_data:/root/.ollama
    # ${OLLAMA_LLM_MODEL:-phi3:mini} must match AI_module/config.py → llm_model when you change defaults.
    entrypoint: ["/bin/sh", "-c", "ollama pull ${OLLAMA_LLM_MODEL:-phi3:mini}"]

  # One-shot model warmup to make first request faster:
  # - downloads embedding snapshot into AI_module/data/models/... (volume-backed)
  # - warms up the reranker (downloads to HF cache volume)
  model_prep:
    build:
      context: .
      dockerfile: AI_api/Dockerfile
    environment:
      HF_HOME: /models/huggingface
    volumes:
      - hf_cache:/models/huggingface
      - rag_models:/app/AI_module/data/models
    command: >
      python -c "from AI_module.dev_tools.download_embedding_model import main as d;
      import sys; rc=d();
      from sentence_transformers import CrossEncoder;
      CrossEncoder('cross-encoder/ms-marco-MiniLM-L-6-v2');
      sys.exit(rc)"

  rag:
    build:
      context: .
      dockerfile: AI_api/Dockerfile
    depends_on:
      - qdrant
    environment:
      QDRANT_HOST: qdrant
      QDRANT_PORT: "6333"
      # If you run Ollama in compose: set OLLAMA_HOST=http://ollama:11434
      # If you run Ollama on the host: set OLLAMA_HOST=http://host.docker.internal:11434
      OLLAMA_HOST: "${OLLAMA_HOST:-http://host.docker.internal:11434}"
      HF_HOME: /models/huggingface
    ports:
      - "8000:8000"
    volumes:
      - hf_cache:/models/huggingface
      - rag_models:/app/AI_module/data/models
      - ./AI_module/data/pdfs:/app/AI_module/data/pdfs:ro

  smartpdfreaderapi:
    build:
      context: .
      dockerfile: SmartPdfReaderApi/SmartPdfReaderApi/Dockerfile
    depends_on:
      - mssql
      - rag
    environment:
      ASPNETCORE_URLS: http://0.0.0.0:5000
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Server=mssql,1433;Database=ChatHistoryDb;User Id=sa;Password=${MSSQL_SA_PASSWORD:-Your_strong_password123};TrustServerCertificate=True;MultipleActiveResultSets=true;"
      ChatService__FastApiBaseUrl: "http://rag:8000"
    ports:
      - "5000:5000"

  # One-shot DB migration runner (EF Core) for the containerized SQL Server.
  # Run: docker compose run --rm api_migrations
  api_migrations:
    image: mcr.microsoft.com/dotnet/sdk:8.0
    working_dir: /src
    depends_on:
      - mssql
    environment:
      ConnectionStrings__DefaultConnection: "Server=mssql,1433;Database=ChatHistoryDb;User Id=sa;Password=${MSSQL_SA_PASSWORD:-Your_strong_password123};TrustServerCertificate=True;MultipleActiveResultSets=true;"
    volumes:
      - ./:/src
    command: >
      bash -lc "dotnet tool install --global dotnet-ef --version 8.* &&
      export PATH=\"$$PATH:/root/.dotnet/tools\" &&
      cd SmartPdfReaderApi &&
      dotnet ef database update --project Data --startup-project SmartPdfReaderApi/SmartPdfReaderApi.csproj"

volumes:
  qdrant_data:
  mssql_data:
  ollama_data:
  hf_cache:
  rag_models:
